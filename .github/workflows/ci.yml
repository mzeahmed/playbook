# Continuous integration: verifies every push and pull request builds,
# is formatted, passes go vet, and passes the test suite.
name: CI

# Run on every push and every pull request, regardless of branch.
on:
  push:
    branches:
      - main

  pull_request:

# Read-only checkout is all this workflow needs.
permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Reads the Go version from go.mod instead of hardcoding one here,
          # so this workflow can never drift out of sync with the module.
          go-version-file: go.mod
          # No go.sum yet (no external dependencies), so module caching has
          # nothing to key off — re-enable once one exists.
          cache: false

      - name: Format
        run: go fmt ./...

      - name: Check formatting
        # go fmt above rewrites any misformatted file in place. If it
        # touched anything, the checkout is now dirty and this diff is
        # non-empty, which fails the step (git diff --exit-code returns 1
        # when there are differences).
        run: git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
